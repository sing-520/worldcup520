let currentRound = [];
let nextRound = [];
let roundSize = 0;
let index = 0;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function startGame(size) {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";

  shuffle(players);
  currentRound = players.slice(0, size);
  roundSize = size;
  index = 0;
  nextRound = [];

  updateRoundTitle();
  showMatch();
}

function updateRoundTitle() {
  document.getElementById("roundTitle").innerText = roundSize + "강";
}

function showMatch() {
  if (index >= currentRound.length) {
    currentRound = nextRound;
    roundSize = currentRound.length;
    nextRound = [];
    index = 0;

    if (roundSize === 1) {
      showWinner(currentRound[0]);
      return;
    }

    updateRoundTitle();
  }

  document.getElementById("img1").src = currentRound[index].img;
  document.getElementById("img2").src = currentRound[index+1].img;

  document.getElementById("name1").innerText = currentRound[index].name;
  document.getElementById("name2").innerText = currentRound[index+1].name;
}

function select(choice) {
  nextRound.push(currentRound[index + choice]);
  index += 2;
  showMatch();
}

function showWinner(winner) {
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "block";
  document.getElementById("winnerImg").src = winner.img;
  document.getElementById("winnerName").innerText = winner.name;
}
